<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pole prostokąta / trójkąta</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f0e8;
      color: #2c2c2c;
      overflow: hidden;
    }
    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .header {
      flex-shrink: 0;
      padding: 20px 24px 16px;
      background: #e8e0d4;
      border-bottom: 1px solid #d5cdc0;
      position: relative;
    }
    .title {
      margin: 0 0 12px;
      font-weight: 600;
      font-size: 20px;
      color: #111;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      row-gap: 10px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    input[type="text"] {
      width: 80px;
      padding: 6px 8px;
      border: 1px solid #d5cdc0;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
      background: #fdfcf9;
    }
    input[type="range"] {
      width: 140px;
      accent-color: #4a90d9;
      cursor: pointer;
    }
    select {
      padding: 6px 8px;
      border: 1px solid #d5cdc0;
      border-radius: 6px;
      font-size: 14px;
      background: #fdfcf9;
      cursor: pointer;
    }
    .hint {
      font-size: 13px;
      color: #777;
      margin-top: 8px;
    }
    .canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 8px;
      background: #f5f0e8;
      overflow: auto;
      gap: 16px;
    }
    .area-display {
      font-size: 36px;
      font-weight: 700;
      color: #111;
      text-align: center;
      flex-shrink: 0;
    }
    .svg-container {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      cursor: grab;
    }
    .svg-container:active {
      cursor: grabbing;
    }
    svg {
      display: block;
      background: transparent;
      border: none;
    }
    .back-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #b0a89e;
      border-radius: 6px;
      background: #fdfcf9;
      transition: background 0.2s;
    }
    .back-btn:hover {
      background: #d5cdc0;
      color: #000;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h2 class="title">Pole figury</h2>
    <a href="../index.html" class="back-btn">← Powrót do menu</a>
    <div class="controls">
      <div class="control-group">
        <label>Długość:
          <input id="w" type="text" value="5">
        </label>
        <input id="ws" type="range" min="0" max="20" step="1" value="5">
      </div>
      <div class="control-group">
        <label>Wysokość:
          <input id="h" type="text" value="3">
        </label>
        <input id="hs" type="range" min="0" max="20" step="1" value="3">
      </div>
      <div class="control-group">
        <label>Kształt:
          <select id="shapeSelect">
            <option value="rectangle" selected>Prostokąt</option>
            <option value="triangle">Trójkąt prostokątny</option>
          </select>
        </label>
      </div>
    </div>
    <div class="hint">Prostokąt i siatka jednostkowa dopasowują się do okna. Użyj kółka myszy do powiększania.</div>
  </div>

  <div class="canvas-wrap">
    <div class="area-display" id="areaDisplay">Pole: 15</div>
    <div class="svg-container" id="svgContainer">
      <svg id="svg"></svg>
    </div>
  </div>
</div>

<script>
const UNIT = 40;
const PADDING = 2 * UNIT;

const w = document.getElementById('w');
const h = document.getElementById('h');
const ws = document.getElementById('ws');
const hs = document.getElementById('hs');
const shapeSelect = document.getElementById('shapeSelect');
const areaDisplay = document.getElementById('areaDisplay');
const svg = document.getElementById('svg');
const svgContainer = document.getElementById('svgContainer');

let zoom = 1.0;
const ZOOM_MIN = 0.5;
const ZOOM_MAX = 4.0;
const ZOOM_STEP = 0.1;

function num(v) {
  return Math.max(0, Math.min(20, parseFloat(v) || 0));
}

function fmt(n) {
  return parseFloat(n.toFixed(4)).toString();
}

function draw() {
  const width = num(w.value);
  const height = num(h.value);
  const shape = shapeSelect.value;

  let area;
  if (shape === 'triangle') {
    area = (width * height) / 2;
  } else {
    area = width * height;
  }
  areaDisplay.textContent = `Pole: ${fmt(area)}`;

  const cols = Math.max(1, Math.ceil(width));
  const rows = Math.max(1, Math.ceil(height));

  const baseSvgW = cols * UNIT + 2 * PADDING;
  const baseSvgH = rows * UNIT + 2 * PADDING;

  const actualW = baseSvgW * zoom;
  const actualH = baseSvgH * zoom;

  svg.setAttribute('viewBox', `0 0 ${baseSvgW} ${baseSvgH}`);
  svg.setAttribute('width', actualW);
  svg.setAttribute('height', actualH);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  const ox = PADDING;
  const oy = PADDING;

  let s = '';

  // 1. Grid lines – dark grey, behind everything
  for (let x = 0; x <= cols; x++) {
    s += `<line x1="${ox + x * UNIT}" y1="${oy}" x2="${ox + x * UNIT}" y2="${oy + rows * UNIT}" stroke="#666" stroke-width="0.5"/>`;
  }
  for (let y = 0; y <= rows; y++) {
    s += `<line x1="${ox}" y1="${oy + y * UNIT}" x2="${ox + cols * UNIT}" y2="${oy + y * UNIT}" stroke="#666" stroke-width="0.5"/>`;
  }

  // 2. Rectangle outline – always shown
  s += `<rect x="${ox}" y="${oy}" width="${width * UNIT}" height="${height * UNIT}" fill="none" stroke="black" stroke-width="2"/>`;

  // 3. Filled area
  if (shape === 'rectangle') {
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const vw = Math.max(0, Math.min(1, width - x));
        const vh = Math.max(0, Math.min(1, height - y));
        if (vw <= 0 || vh <= 0) continue;
        s += `<rect x="${ox + x * UNIT}" y="${oy + y * UNIT}" width="${vw * UNIT}" height="${vh * UNIT}" fill="rgba(74, 144, 217, 0.35)"/>`;
      }
    }
  } else if (shape === 'triangle') {
    const p1 = `${ox},${oy}`;
    const p2 = `${ox + width * UNIT},${oy}`;
    const p3 = `${ox},${oy + height * UNIT}`;
    s += `<polygon points="${p1} ${p2} ${p3}" fill="rgba(74, 144, 217, 0.35)" stroke="black" stroke-width="2"/>`;
  }

  svg.innerHTML = s;
}

svgContainer.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
  zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom + delta));
  draw();
}, { passive: false });

w.oninput = () => draw();
h.oninput = () => draw();
ws.oninput = () => { w.value = ws.value; draw(); };
hs.oninput = () => { h.value = hs.value; draw(); };
shapeSelect.onchange = () => draw();

draw();
</script>
</body>
</html>
