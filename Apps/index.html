<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikacje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
  // Default to dark unless user explicitly chose light
  if (localStorage.getItem('theme') !== 'light') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
  <link rel="stylesheet" href="../shared/common.css">
  <style>
    body { min-height: 100dvh; display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; gap: 28px; }
    @media (max-width: 600px) {
      .main { padding: 24px 16px; gap: 16px; justify-content: flex-start; padding-top: 32px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Aplikacje</span>
    <div class="topbar-right">
      <label class="theme-toggle" title="Tryb ciemny / jasny">
      <input type="checkbox" id="themeToggle">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-icon">🌙</span>
    </label>
      <a href="../index.html" class="back-btn">← Menu</a>
    </div>
  </div>
  <div class="main">
    <div class="card-grid">
      <a href="PoleApp/index.html" class="card">
        <div class="card-icon">📐</div>
        <div><div class="card-title">Pole figury</div><div class="card-desc">Wizualizacja pola z siatką jednostkową.</div></div>
      </a>
      <a href="UlamkiApp/index.html" class="card">
        <div class="card-icon">🥧</div>
        <div><div class="card-title">Ułamki</div><div class="card-desc">Ułamki jako koło lub pasek.</div></div>
      </a>
      <a href="PrismApp/index.html" class="card">
        <div class="card-icon">📦</div>
        <div><div class="card-title">Prostopadłościan 3D</div><div class="card-desc">Obracany prostopadłościan z siatką.</div></div>
      </a>
    </div>
  </div>
  <script src="../shared/theme.js"></script>
</body>
</html>
