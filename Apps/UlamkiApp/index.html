<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizualizacja ułamków</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
  // Default to dark unless user explicitly chose light
  if (localStorage.getItem('theme') !== 'light') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
  <link rel="stylesheet" href="../../shared/common.css">
  <style>
    body { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-wrap {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px; padding: 10px; overflow: hidden;
    }
    .frac-display { flex-shrink: 0; display: flex; align-items: center; gap: 10px; line-height: 1; }
    .frac-stack { display: inline-flex; flex-direction: column; align-items: center; font-size: 52px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .frac-line { width: 100%; min-width: 30px; height: 3px; background: currentColor; margin: 3px 0; border-radius: 2px; }
    .frac-decimal { font-size: 22px; font-weight: 500; color: var(--text-muted); }
    svg { display: block; flex: 1; min-height: 0; max-width: 100%; max-height: 100%; }
    @media (max-width: 600px) {
      .frac-stack { font-size: 44px; }
      .frac-decimal { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Wizualizacja ułamków</span>
    <div class="topbar-right">
      <label class="theme-toggle" title="Tryb ciemny / jasny">
      <input type="checkbox" id="themeToggle">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-icon">🌙</span>
    </label>
      <a href="../index.html" class="back-btn">← Powrót</a>
    </div>
  </div>
  <div class="canvas-wrap">
    <div class="frac-display">
      <span class="frac-stack">
        <span id="fracNum">3</span>
        <span class="frac-line"></span>
        <span id="fracDen">4</span>
      </span>
      <span class="frac-decimal">= <span id="decimalText">0.75</span></span>
    </div>
    <svg id="svg"></svg>
  </div>
  <div class="controls-bar">
    <div class="control-group">
      <span class="ctrl-label">Licznik</span>
      <input id="num" type="text" inputmode="numeric" value="3">
      <input id="nums" type="range" min="0" max="10" step="1" value="3">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group">
      <span class="ctrl-label">Mianownik</span>
      <input id="den" type="text" inputmode="numeric" value="4">
      <input id="dens" type="range" min="1" max="20" step="1" value="4">
    </div>
    <div class="bar-divider"></div>
    <div class="control-group">
      <span class="ctrl-label">Widok</span>
      <select id="modeSelect">
        <option value="pie" selected>Koło</option>
        <option value="bar">Pasek</option>
      </select>
    </div>
    <div class="control-group">
      <span class="ctrl-label">Kolor</span>
      <input id="colorPicker" type="color" value="#4a90d9">
    </div>
  </div>
  <script src="../../shared/theme.js"></script>
  <script>
  const numInput=document.getElementById('num'),denInput=document.getElementById('den');
  const numSlider=document.getElementById('nums'),denSlider=document.getElementById('dens');
  const modeSelect=document.getElementById('modeSelect'),colorPicker=document.getElementById('colorPicker');
  const fracNum=document.getElementById('fracNum'),fracDen=document.getElementById('fracDen');
  const decimalText=document.getElementById('decimalText'),svg=document.getElementById('svg');
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function hexToRgba(hex,alpha){hex=hex.replace('#','');const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);return `rgba(${r},${g},${b},${alpha})`;}
  function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
  function draw(){
    let num=parseInt(numInput.value)||0,den=parseInt(denInput.value)||1;
    den=Math.max(1,Math.min(20,den));num=clamp(num,0,den);
    numSlider.max=den;numSlider.value=num;numInput.value=num;
    denSlider.value=den;denInput.value=den;
    fracNum.textContent=num;fracDen.textContent=den;
    decimalText.textContent=(num/den).toFixed(4).replace(/\.?0+$/,'');
    const mode=modeSelect.value,fillColor=hexToRgba(colorPicker.value,0.65);
    const dark=isDark(),unfill=dark?'rgba(255,255,255,0.06)':'rgba(200,200,200,0.12)',stroke=dark?'#999':'#222';
    const PAD=40;let s='';
    if(mode==='pie'){
      const vs=440,cx=vs/2,cy=vs/2,r=180;
      svg.setAttribute('viewBox',`0 0 ${vs} ${vs}`);svg.setAttribute('width','100%');svg.setAttribute('height','100%');svg.setAttribute('preserveAspectRatio','xMidYMid meet');
      if(den>0){
        const as=(2*Math.PI)/den;
        for(let i=0;i<den;i++){const sa=-Math.PI/2+i*as,ea=sa+as,x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea),la=as>Math.PI?1:0,fill=i<num?fillColor:unfill;s+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${la},1 ${x2},${y2} Z" fill="${fill}" stroke="none"/>`;}
        for(let i=0;i<den;i++){const a=-Math.PI/2+i*as;s+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="${stroke}" stroke-opacity="0.2" stroke-width="1"/>`;}
        s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${stroke}" stroke-width="2"/>`;
      }
    } else {
      const U=48,BH=100,tw=den*U+2*PAD,th=BH+2*PAD;
      svg.setAttribute('viewBox',`0 0 ${tw} ${th}`);svg.setAttribute('width','100%');svg.setAttribute('height','100%');svg.setAttribute('preserveAspectRatio','xMidYMid meet');
      const bx=PAD,by=PAD;
      s+=`<rect x="${bx}" y="${by}" width="${den*U}" height="${BH}" rx="6" fill="none" stroke="${stroke}" stroke-width="2"/>`;
      if(num>0){s+=`<rect x="${bx}" y="${by}" width="${num*U}" height="${BH}" rx="6" fill="${fillColor}"/>`;s+=`<rect x="${bx}" y="${by}" width="${den*U}" height="${BH}" rx="6" fill="none" stroke="${stroke}" stroke-width="2"/>`;}
      for(let i=1;i<den;i++){const x=bx+i*U;s+=`<line x1="${x}" y1="${by}" x2="${x}" y2="${by+BH}" stroke="${stroke}" stroke-opacity="0.2" stroke-width="0.8"/>`;}
    }
    svg.innerHTML=s;
  }
  function onNum(){let v=parseInt(numInput.value)||0;const d=parseInt(denInput.value)||1;v=clamp(v,0,d);numInput.value=v;numSlider.value=v;draw();}
  function onDen(){let v=parseInt(denInput.value)||1;v=Math.max(1,Math.min(20,v));denInput.value=v;denSlider.value=v;let n=parseInt(numInput.value)||0;if(n>v){n=v;numInput.value=n;numSlider.value=n;}numSlider.max=v;draw();}
  numInput.oninput=onNum;denInput.oninput=onDen;
  numSlider.oninput=()=>{numInput.value=numSlider.value;draw();};
  denSlider.oninput=()=>{const v=parseInt(denSlider.value);denInput.value=v;let n=parseInt(numInput.value)||0;if(n>v){n=v;numInput.value=n;numSlider.value=n;}numSlider.max=v;draw();};
  modeSelect.onchange=()=>draw();colorPicker.oninput=()=>draw();
  window.addEventListener('themechange',draw);
  draw();
  </script>
</body>
</html>
