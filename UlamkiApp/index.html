<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizualizacja ułamków</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f0e8;  /* warm pastel */
      color: #2c2c2c;
      overflow: hidden;
    }
    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .header {
      flex-shrink: 0;
      padding: 20px 24px 16px;
      background: #f5f0e8;
      border-bottom: 1px solid #e0d6c8;
      position: relative;
    }
    .title {
      margin: 0 0 14px;
      font-weight: 600;
      font-size: 20px;
      color: #111;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      row-gap: 10px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    input[type="text"] {
      width: 60px;
      padding: 6px 8px;
      border: 1px solid #d5cdc0;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
      background: #fdfcf9;
    }
    input[type="range"] {
      width: 120px;
      accent-color: #4a90d9;
      cursor: pointer;
    }
    select {
      padding: 6px 10px;
      border: 1px solid #d5cdc0;
      border-radius: 6px;
      font-size: 14px;
      background: #fdfcf9;
      cursor: pointer;
    }
    .fraction-display {
      font-size: 36px;
      font-weight: 700;
      color: #111;
      text-align: center;
      margin-left: auto;
    }
    .decimal-display {
      font-size: 18px;
      font-weight: 400;
      color: #777;
    }
    .hint {
      font-size: 13px;
      color: #999;
      margin-top: 10px;
    }
    .canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      background: #f5f0e8;
      overflow: auto;
    }
    svg {
      display: block;
      max-width: 100%;
      max-height: 100%;
      background: #f5f0e8;
    }
    .back-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 13px;
      color: #999;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #d5cdc0;
      border-radius: 6px;
      background: #fdfcf9;
      transition: background 0.2s;
    }
    .back-btn:hover {
      background: #e8e2d6;
      color: #666;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h2 class="title">Wizualizacja ułamków</h2>
    <a href="../index.html" class="back-btn">← Powrót do menu</a>
    <div class="controls">
      <div class="control-group">
        <label>Licznik:
          <input id="num" type="text" value="3">
        </label>
        <input id="nums" type="range" min="0" max="10" step="1" value="3">
      </div>
      <div class="control-group">
        <label>Mianownik:
          <input id="den" type="text" value="4">
        </label>
        <input id="dens" type="range" min="1" max="20" step="1" value="4">
      </div>
      <div class="control-group">
        <label>Widok:
          <select id="modeSelect">
            <option value="pie" selected>Koło</option>
            <option value="bar">Pasek</option>
          </select>
        </label>
      </div>
      <div class="fraction-display">
        <span id="fractionText">3/4</span>
        <span class="decimal-display"> = <span id="decimalText">0.75</span></span>
      </div>
    </div>
    <div class="hint">Przeciągaj suwaki lub wpisuj liczby. Licznik nie może być większy niż mianownik.</div>
  </div>

  <div class="canvas-wrap">
    <svg id="svg"></svg>
  </div>
</div>

<script>
const numInput = document.getElementById('num');
const denInput = document.getElementById('den');
const numSlider = document.getElementById('nums');
const denSlider = document.getElementById('dens');
const modeSelect = document.getElementById('modeSelect');
const fractionText = document.getElementById('fractionText');
const decimalText = document.getElementById('decimalText');
const svg = document.getElementById('svg');

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function draw() {
  let numerator = parseInt(numInput.value) || 0;
  let denominator = parseInt(denInput.value) || 1;

  denominator = Math.max(1, Math.min(20, denominator));
  numerator = clamp(numerator, 0, denominator);

  // Sync sliders and text inputs
  numSlider.max = denominator;
  numSlider.value = numerator;
  numInput.value = numerator;
  denSlider.value = denominator;
  denInput.value = denominator;

  // Display
  fractionText.textContent = `${numerator}/${denominator}`;
  decimalText.textContent = (numerator / denominator).toFixed(4).replace(/\.?0+$/, '');

  const mode = modeSelect.value;

  const PAD = 40;
  let s = '';

  if (mode === 'pie') {
    // ---- PIE CHART ----
    const vbSize = 440;
    const cx = vbSize / 2;
    const cy = vbSize / 2;
    const r = 180;

    svg.setAttribute('viewBox', `0 0 ${vbSize} ${vbSize}`);
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    if (denominator > 0) {
      const angleStep = (2 * Math.PI) / denominator;

      for (let i = 0; i < denominator; i++) {
        const startAngle = -Math.PI / 2 + i * angleStep;
        const endAngle = startAngle + angleStep;

        const x1 = cx + r * Math.cos(startAngle);
        const y1 = cy + r * Math.sin(startAngle);
        const x2 = cx + r * Math.cos(endAngle);
        const y2 = cy + r * Math.sin(endAngle);

        const largeArc = angleStep > Math.PI ? 1 : 0;
        const fill = i < numerator
          ? 'rgba(74, 144, 217, 0.35)'
          : 'rgba(200, 200, 200, 0.08)';

        s += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z" fill="${fill}" stroke="#888" stroke-width="0.8"/>`;
      }

      // Circle outline
      s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="black" stroke-width="2"/>`;
    }

  } else if (mode === 'bar') {
    // ---- FRACTION BAR ----
    const UNIT = 48;
    const BAR_H = 100;
    const totalW = denominator * UNIT + 2 * PAD;
    const totalH = BAR_H + 2 * PAD;

    svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    const barX = PAD;
    const barY = PAD;

    // Bar outline (rounded)
    s += `<rect x="${barX}" y="${barY}" width="${denominator * UNIT}" height="${BAR_H}" rx="6" ry="6" fill="none" stroke="black" stroke-width="2"/>`;

    // Filled portion
    if (numerator > 0) {
      s += `<rect x="${barX}" y="${barY}" width="${numerator * UNIT}" height="${BAR_H}" rx="6" ry="6" fill="rgba(74, 144, 217, 0.35)"/>`;
      // Redraw outline on top to keep borders sharp
      s += `<rect x="${barX}" y="${barY}" width="${denominator * UNIT}" height="${BAR_H}" rx="6" ry="6" fill="none" stroke="black" stroke-width="2"/>`;
    }

    // Division lines
    for (let i = 1; i < denominator; i++) {
      const x = barX + i * UNIT;
      s += `<line x1="${x}" y1="${barY}" x2="${x}" y2="${barY + BAR_H}" stroke="#999" stroke-width="0.8"/>`;
    }
  }

  svg.innerHTML = s;
}

// ---- Event handlers ----
function onNumChange() {
  let val = parseInt(numInput.value) || 0;
  const den = parseInt(denInput.value) || 1;
  val = clamp(val, 0, den);
  numInput.value = val;
  numSlider.value = val;
  draw();
}

function onDenChange() {
  let val = parseInt(denInput.value) || 1;
  val = Math.max(1, Math.min(20, val));
  denInput.value = val;
  denSlider.value = val;
  // Cap numerator if needed
  let num = parseInt(numInput.value) || 0;
  if (num > val) {
    num = val;
    numInput.value = num;
    numSlider.value = num;
  }
  numSlider.max = val;
  draw();
}

numInput.oninput = onNumChange;
denInput.oninput = onDenChange;

numSlider.oninput = () => {
  numInput.value = numSlider.value;
  draw();
};
denSlider.oninput = () => {
  const val = parseInt(denSlider.value);
  denInput.value = val;
  let num = parseInt(numInput.value) || 0;
  if (num > val) {
    num = val;
    numInput.value = num;
    numSlider.value = num;
  }
  numSlider.max = val;
  draw();
};

modeSelect.onchange = () => draw();

// Initial draw
draw();
</script>
</body>
</html>
