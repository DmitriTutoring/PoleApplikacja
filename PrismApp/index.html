<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prostopadłościan – objętość</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f0e8;
      color: #2c2c2c;
      overflow: hidden;
    }
    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .header {
      flex-shrink: 0;
      padding: 20px 24px 16px;
      background: #e8e0d4;
      border-bottom: 1px solid #d5cdc0;
      position: relative;
    }
    .title {
      margin: 0 0 14px;
      font-weight: 600;
      font-size: 20px;
      color: #111;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      row-gap: 10px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    input[type="text"] {
      width: 60px;
      padding: 6px 8px;
      border: 1px solid #d5cdc0;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
      background: #fdfcf9;
    }
    input[type="range"] {
      width: 120px;
      accent-color: #4a90d9;
      cursor: pointer;
    }
    .volume-display {
      font-size: 36px;
      font-weight: 700;
      color: #111;
      text-align: center;
      margin-left: auto;
    }
    .hint {
      font-size: 13px;
      color: #999;
      margin-top: 10px;
    }
    .canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f0e8;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    .back-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #b0a89e;
      border-radius: 6px;
      background: #fdfcf9;
      transition: background 0.2s;
    }
    .back-btn:hover {
      background: #d5cdc0;
      color: #000;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h2 class="title">Prostopadłościan – objętość</h2>
    <a href="../index.html" class="back-btn">← Powrót do menu</a>
    <div class="controls">
      <div class="control-group">
        <label>Szerokość:
          <input id="w" type="text" value="1">
        </label>
        <input id="ws" type="range" min="0" max="10" step="1" value="1">
      </div>
      <div class="control-group">
        <label>Wysokość:
          <input id="h" type="text" value="1">
        </label>
        <input id="hs" type="range" min="0" max="10" step="1" value="1">
      </div>
      <div class="control-group">
        <label>Głębokość:
          <input id="d" type="text" value="1">
        </label>
        <input id="ds" type="range" min="0" max="10" step="1" value="1">
      </div>
      <div class="volume-display" id="volumeDisplay">Objętość: 1</div>
    </div>
    <div class="hint">Użyj myszy do obracania i przybliżania. Kółko myszy – zoom.</div>
  </div>

  <div class="canvas-wrap" id="canvasContainer"></div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// DOM elements
const wInput = document.getElementById('w');
const hInput = document.getElementById('h');
const dInput = document.getElementById('d');
const wsSlider = document.getElementById('ws');
const hsSlider = document.getElementById('hs');
const dsSlider = document.getElementById('ds');
const volumeDisplay = document.getElementById('volumeDisplay');
const container = document.getElementById('canvasContainer');

// --- Setup Three.js ---
const scene = new THREE.Scene();
scene.background = new THREE.Color('#f5f0e8');

const camera = new THREE.PerspectiveCamera(
  45,
  container.clientWidth / container.clientHeight,
  0.1,
  100
);
camera.position.set(8, 5, 10);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 7);
scene.add(directionalLight);

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.target.set(0, 1, 0);
controls.update();

// --- Ground grid (dynamic size) ---
let groundGrid = new THREE.GridHelper(12, 12, '#bbb', '#ddd');
groundGrid.position.y = 0;
scene.add(groundGrid);

// --- Box ---
const boxMaterial = new THREE.MeshStandardMaterial({
  color: '#4a90d9',
  roughness: 0.3,
  metalness: 0.1,
  transparent: true,
  opacity: 0.8,
  side: THREE.DoubleSide
});
const unitBoxGeometry = new THREE.BoxGeometry(1, 1, 1);
const boxMesh = new THREE.Mesh(unitBoxGeometry, boxMaterial);
scene.add(boxMesh);

// --- Surface grid group (thick lines) + Edge group ---
const surfaceGridGroup = new THREE.Group();
const edgeGroup = new THREE.Group();
scene.add(surfaceGridGroup);
scene.add(edgeGroup);

// --- Helpers ---
const LINE_THICKNESS = 0.022;
const CORNER_SIZE = LINE_THICKNESS;

function createThickLine(x1, y1, z1, x2, y2, z2, color = '#000') {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const dz = z2 - z1;
  const length = Math.sqrt(dx * dx + dy * dy + dz * dz);
  const midX = (x1 + x2) / 2;
  const midY = (y1 + y2) / 2;
  const midZ = (z1 + z2) / 2;

  let geometry;
  if (Math.abs(dy) > 0.001) {
    geometry = new THREE.BoxGeometry(LINE_THICKNESS, length, LINE_THICKNESS);
  } else if (Math.abs(dx) > 0.001) {
    geometry = new THREE.BoxGeometry(length, LINE_THICKNESS, LINE_THICKNESS);
  } else {
    geometry = new THREE.BoxGeometry(LINE_THICKNESS, LINE_THICKNESS, length);
  }

  const material = new THREE.MeshBasicMaterial({ color });
  const box = new THREE.Mesh(geometry, material);
  box.position.set(midX, midY, midZ);
  return box;
}

function createCornerCube(x, y, z) {
  const geometry = new THREE.BoxGeometry(CORNER_SIZE, CORNER_SIZE, CORNER_SIZE);
  const material = new THREE.MeshBasicMaterial({ color: '#000' });
  const cube = new THREE.Mesh(geometry, material);
  cube.position.set(x, y, z);
  return cube;
}

const HOVER_OFFSET = 0.24;

// --- State variables ---
let lastW = 1;
let lastH = 1;
let lastD = 1;

// --- Update functions ---
function updateSurfaceGrid(w, h, d) {
  while(surfaceGridGroup.children.length > 0) {
    surfaceGridGroup.remove(surfaceGridGroup.children[0]);
  }
  while(edgeGroup.children.length > 0) {
    edgeGroup.remove(edgeGroup.children[0]);
  }

  if (w <= 0 || h <= 0 || d <= 0) return;

  const halfW = w / 2;
  const halfD = d / 2;
  const step = 1;
  const topY = HOVER_OFFSET + h;
  const bottomY = HOVER_OFFSET;

  function generatePositions(total, halfOffset) {
    const positions = [];
    for (let i = 0; i <= Math.floor(total); i += step) {
      positions.push(i - halfOffset);
    }
    if (!positions.includes(halfOffset)) positions.push(halfOffset);
    if (!positions.includes(-halfOffset)) positions.push(-halfOffset);
    return positions;
  }

  const xPositions = generatePositions(w, halfW);
  const zPositions = generatePositions(d, halfD);
  const yPositions = [];
  for (let i = 0; i <= Math.floor(h); i += step) {
    yPositions.push(bottomY + i);
  }
  if (!yPositions.includes(topY)) yPositions.push(topY);
  if (!yPositions.includes(bottomY)) yPositions.push(bottomY);

  function addLine(x1, y1, z1, x2, y2, z2) {
    surfaceGridGroup.add(createThickLine(x1, y1, z1, x2, y2, z2));
  }

  // Faces
  // Front
  for (const x of xPositions) addLine(x, bottomY, halfD, x, topY, halfD);
  for (const y of yPositions) addLine(-halfW, y, halfD, halfW, y, halfD);
  // Back
  for (const x of xPositions) addLine(x, bottomY, -halfD, x, topY, -halfD);
  for (const y of yPositions) addLine(-halfW, y, -halfD, halfW, y, -halfD);
  // Right
  for (const z of zPositions) addLine(halfW, bottomY, z, halfW, topY, z);
  for (const y of yPositions) addLine(halfW, y, -halfD, halfW, y, halfD);
  // Left
  for (const z of zPositions) addLine(-halfW, bottomY, z, -halfW, topY, z);
  for (const y of yPositions) addLine(-halfW, y, -halfD, -halfW, y, halfD);
  // Top
  for (const x of xPositions) addLine(x, topY, -halfD, x, topY, halfD);
  for (const z of zPositions) addLine(-halfW, topY, z, halfW, topY, z);
  // Bottom
  for (const x of xPositions) addLine(x, bottomY, -halfD, x, bottomY, halfD);
  for (const z of zPositions) addLine(-halfW, bottomY, z, halfW, bottomY, z);

  // Edges (12 thick bars along the prism outline)
  const corners = [
    [-halfW, bottomY, -halfD], [ halfW, bottomY, -halfD],
    [ halfW, bottomY,  halfD], [-halfW, bottomY,  halfD],
    [-halfW, topY,    -halfD], [ halfW, topY,    -halfD],
    [ halfW, topY,     halfD], [-halfW, topY,     halfD]
  ];
  const edges = [
    [0,1], [1,2], [2,3], [3,0], // bottom
    [4,5], [5,6], [6,7], [7,4], // top
    [0,4], [1,5], [2,6], [3,7]  // verticals
  ];

  for (const [i, j] of edges) {
    const p = corners[i], q = corners[j];
    edgeGroup.add(createThickLine(p[0], p[1], p[2], q[0], q[1], q[2]));
  }

  // Corner cubes to cap the edges cleanly
  for (const [cx, cy, cz] of corners) {
    edgeGroup.add(createCornerCube(cx, cy, cz));
  }
}

function updateGroundGrid(maxDim) {
  scene.remove(groundGrid);
  const size = Math.max(maxDim, 4) + 2;
  groundGrid = new THREE.GridHelper(size, Math.ceil(size), '#bbb', '#ddd');
  groundGrid.position.y = 0;
  scene.add(groundGrid);
}

function updatePrism() {
  boxMesh.scale.set(lastW, lastH, lastD);
  boxMesh.position.set(0, HOVER_OFFSET + lastH / 2, 0);

  if (lastW <= 0 || lastH <= 0 || lastD <= 0) {
    boxMesh.visible = false;
  } else {
    boxMesh.visible = true;
  }

  const volume = lastW * lastH * lastD;
  volumeDisplay.textContent = `Objętość: ${parseFloat(volume.toFixed(2))}`;
  updateSurfaceGrid(lastW, lastH, lastD);
  updateGroundGrid(Math.max(lastW, lastD));
}

// --- Input handling ---
function onSliderChange() {
  lastW = parseFloat(wsSlider.value);
  lastH = parseFloat(hsSlider.value);
  lastD = parseFloat(dsSlider.value);
  wInput.value = lastW;
  hInput.value = lastH;
  dInput.value = lastD;
  updatePrism();
}

wsSlider.addEventListener('input', onSliderChange);
hsSlider.addEventListener('input', onSliderChange);
dsSlider.addEventListener('input', onSliderChange);

wInput.addEventListener('change', () => {
  const val = parseFloat(wInput.value);
  if (!isNaN(val)) {
    lastW = Math.max(0, Math.min(10, val));
    wsSlider.value = lastW;
    wInput.value = lastW;
    updatePrism();
  } else {
    wInput.value = lastW;
  }
});

hInput.addEventListener('change', () => {
  const val = parseFloat(hInput.value);
  if (!isNaN(val)) {
    lastH = Math.max(0, Math.min(10, val));
    hsSlider.value = lastH;
    hInput.value = lastH;
    updatePrism();
  } else {
    hInput.value = lastH;
  }
});

dInput.addEventListener('change', () => {
  const val = parseFloat(dInput.value);
  if (!isNaN(val)) {
    lastD = Math.max(0, Math.min(10, val));
    dsSlider.value = lastD;
    dInput.value = lastD;
    updatePrism();
  } else {
    dInput.value = lastD;
  }
});

// --- Resize handler ---
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// --- Animation loop ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

updatePrism();
animate();
</script>
</body>
</html>
